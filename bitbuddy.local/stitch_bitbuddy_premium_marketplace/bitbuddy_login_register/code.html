<!DOCTYPE html>

<html class="dark" lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BitBuddy - Вход / Регистрация</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#819fff",
                        "on-secondary-fixed": "#00394e",
                        "surface-container-high": "#201f1f",
                        "on-tertiary": "#00236d",
                        "surface-container-low": "#131313",
                        "primary-container": "#00cffc",
                        "on-secondary-container": "#f1f9ff",
                        "on-primary-fixed": "#002a35",
                        "tertiary-container": "#7696fd",
                        "tertiary-fixed": "#95adff",
                        "inverse-primary": "#006880",
                        "on-primary-fixed-variant": "#004a5c",
                        "on-tertiary-fixed": "#001345",
                        "error-container": "#9f0519",
                        "error-dim": "#d7383b",
                        "background": "#0e0e0e",
                        "on-surface-variant": "#adaaaa",
                        "inverse-surface": "#fcf8f8",
                        "error": "#ff716c",
                        "surface-container-highest": "#262626",
                        "on-secondary": "#00374c",
                        "surface-variant": "#262626",
                        "surface-container-lowest": "#000000",
                        "on-error": "#490006",
                        "secondary-container": "#006688",
                        "tertiary-dim": "#7999ff",
                        "on-background": "#ffffff",
                        "outline": "#777575",
                        "on-tertiary-container": "#001851",
                        "primary": "#69daff",
                        "primary-dim": "#00c0ea",
                        "on-surface": "#ffffff",
                        "primary-fixed": "#00cffc",
                        "on-primary-container": "#004050",
                        "secondary-dim": "#00b2ec",
                        "secondary-fixed": "#98daff",
                        "inverse-on-surface": "#565554",
                        "surface-tint": "#69daff",
                        "on-error-container": "#ffa8a3",
                        "primary-fixed-dim": "#00c0ea",
                        "surface-container": "#1a1919",
                        "surface-bright": "#2c2c2c",
                        "secondary": "#17c0fd",
                        "on-secondary-fixed-variant": "#005775",
                        "on-tertiary-fixed-variant": "#00318e",
                        "outline-variant": "#494847",
                        "secondary-fixed-dim": "#6ecfff",
                        "tertiary": "#89a5ff",
                        "surface": "#0e0e0e",
                        "on-primary": "#004a5d",
                        "surface-dim": "#0e0e0e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Ambient Floating Orbs -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary/5 blur-[120px] mix-blend-screen"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-dim/5 blur-[150px] mix-blend-screen"></div>
</div>
<!-- Top Navigation (Suppressed due to linear/transactional intent) -->
<!-- Content Canvas prioritized for Auth -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20 max-w-none">
<div class="text-2xl font-extrabold tracking-tighter text-white">BitBuddy</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center p-6 relative z-10">
<!-- Glassmorphic Auth Card -->
<div class="w-full max-w-md bg-surface-container-highest/60 backdrop-blur-[25px] rounded-2xl p-8 shadow-[0_40px_80px_rgba(105,218,255,0.08)] border border-outline-variant/15 relative overflow-hidden">
<!-- Subtle Inner Glow -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-2 bg-gradient-to-r from-transparent via-primary/30 to-transparent blur-sm"></div>
<!-- Header -->
<div class="text-center mb-8">
<h1 class="text-3xl font-extrabold tracking-tight text-white mb-2">Добро пожаловать</h1>
<p class="text-on-surface-variant text-sm">Войдите, чтобы продолжить работу с BitBuddy.</p>
</div>
<!-- Tab Switcher -->
<div class="flex p-1 bg-surface-container-low rounded-lg mb-8 relative">
<!-- Sliding Indicator (Static representation for "Вход") -->
<div class="absolute inset-y-1 left-1 w-[calc(50%-4px)] bg-surface-variant/80 backdrop-blur-md border border-outline-variant/20 rounded-md shadow-sm pointer-events-none"></div>
<button class="flex-1 py-2 text-sm font-semibold text-primary z-10 relative focus:outline-none">
                    Вход
                </button>
<button class="flex-1 py-2 text-sm font-medium text-on-surface-variant hover:text-white transition-colors duration-300 z-10 relative focus:outline-none">
                    Регистрация
                </button>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Field -->
<div>
<label class="block text-xs font-semibold text-on-surface-variant mb-2 ml-1" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
<input class="w-full bg-surface-container-lowest text-on-surface pl-12 pr-4 py-3 rounded-xl border-b border-outline-variant/20 focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-on-surface-variant/50" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block text-xs font-semibold text-on-surface-variant mb-2 ml-1" for="password">Пароль</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full bg-surface-container-lowest text-on-surface pl-12 pr-12 py-3 rounded-xl border-b border-outline-variant/20 focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-on-surface-variant/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Meta Actions -->
<div class="flex items-center justify-between text-sm">
<label class="flex items-center cursor-pointer group">
<input class="form-checkbox rounded bg-surface-container-lowest border-outline-variant/30 text-primary focus:ring-primary focus:ring-offset-background h-4 w-4 transition-colors" type="checkbox"/>
<span class="ml-2 text-on-surface-variant group-hover:text-white transition-colors">Запомнить меня</span>
</label>
<a class="text-primary hover:text-primary-dim transition-colors hover:drop-shadow-[0_0_8px_rgba(105,218,255,0.5)]" href="#">Забыли пароль?</a>
</div>
<!-- Submit Button -->
<button class="w-full py-3.5 px-6 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-[0_0_20px_rgba(105,218,255,0.3)] hover:shadow-[0_0_30px_rgba(105,218,255,0.6)] transition-all duration-300 transform hover:-translate-y-0.5" type="submit">
                    Войти в систему
                </button>
</form>
<!-- Social/Alternative Auth -->
<div class="mt-8">
<div class="relative flex items-center justify-center mb-6">
<div class="absolute inset-x-0 h-px bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
<span class="relative bg-surface-variant px-4 text-xs text-on-surface-variant tracking-wider uppercase backdrop-blur-md rounded-full border border-outline-variant/15">или</span>
</div>
<button class="w-full flex items-center justify-center gap-3 py-3 px-6 bg-surface-container-lowest/50 hover:bg-surface-container-lowest border border-outline-variant/15 rounded-xl text-sm font-medium text-white transition-all duration-300">
<span class="material-symbols-outlined text-[20px]">login</span>
                    Продолжить с Google
                </button>
</div>
</div>
</main>
<!-- Footer (Suppressed Nav links, minimal branding for Auth page) -->
<footer class="w-full relative bottom-0 bg-[#0e0e0e] border-t border-[#69daff]/10 shadow-[0_-10px_40px_rgba(105,218,255,0.02)] z-20">
<div class="max-w-7xl mx-auto px-8 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
<div class="text-lg font-black text-white/50 tracking-tighter">BitBuddy</div>
<div class="font-inter text-xs tracking-wide text-neutral-600">
                © 2024 BitBuddy. The Ethereal Exchange.
            </div>
</div>
</footer>
</body></html>
